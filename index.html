<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sintetizador 3 Acordes - Séptima</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: #1a1a2e;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            touch-action: none;
        }
        .container {
            text-align: center;
            background: #16213e;
            padding: 1.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 400px;
        }
        h1 {
            font-size: 1.3rem;
            margin-bottom: 1rem;
            color: #0f3460;
        }
        .sensor-row {
            display: flex;
            justify-content: space-around;
            margin: 0.5rem 0;
        }
        .sensor-card {
            background: #0f3460;
            border-radius: 10px;
            padding: 0.5rem;
            width: 30%;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.5);
        }
        .sensor-label {
            font-size: 0.8rem;
            color: #aaa;
        }
        .sensor-value {
            font-size: 1.2rem;
            font-weight: bold;
        }
        .volume-indicator {
            width: 100%;
            height: 8px;
            background: #53354a;
            border-radius: 4px;
            overflow: hidden;
            margin: 0.5rem 0;
        }
        .volume-fill {
            height: 100%;
            width: 0%;
            background: #e94560;
            transition: width 0.05s ease;
        }
        .note-label {
            font-size: 0.7rem;
            margin-top: 0.2rem;
        }
        button {
            background: #e94560;
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            margin: 1rem 0;
            width: 100%;
            transition: transform 0.2s;
        }
        button:active {
            transform: scale(0.95);
        }
        button.off {
            background: #4a4a4a;
        }
        .status {
            font-size: 1rem;
            color: #aaa;
        }
        .note {
            font-size: 0.7rem;
            color: #888;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎛️ Sintetizador 3 Acordes - Séptima</h1>
        <div class="sensor-row">
            <div class="sensor-card">
                <div class="sensor-label">La (XZ)</div>
                <div class="sensor-value" id="speedGamma">0</div>
                <div class="volume-indicator">
                    <div id="volGammaFill" class="volume-fill"></div>
                </div>
                <div class="note-label">220 Hz (La3)</div>
            </div>
            <div class="sensor-card">
                <div class="sensor-label">Re (D3) (YZ)</div>
                <div class="sensor-value" id="speedBeta">0</div>
                <div class="volume-indicator">
                    <div id="volBetaFill" class="volume-fill"></div>
                </div>
                <div class="note-label">147 Hz (Re3)</div>
            </div>
            <div class="sensor-card">
                <div class="sensor-label">Mi (XY)</div>
                <div class="sensor-value" id="speedAlpha">0</div>
                <div class="volume-indicator">
                    <div id="volAlphaFill" class="volume-fill"></div>
                </div>
                <div class="note-label">165 Hz (Mi3)</div>
            </div>
        </div>
        <button id="powerButton">🔊 ENCENDER</button>
        <div class="status" id="statusText">Apagado</div>
        <div class="note">Cada nota ahora incluye su tercera mayor y séptima menor (acorde de séptima dominante). Gira el dispositivo para mezclarlos.</div>
    </div>

    <script>
        // Elementos del DOM
        const speedGammaSpan = document.getElementById('speedGamma');
        const speedBetaSpan = document.getElementById('speedBeta');
        const speedAlphaSpan = document.getElementById('speedAlpha');
        const volGammaFill = document.getElementById('volGammaFill');
        const volBetaFill = document.getElementById('volBetaFill');
        const volAlphaFill = document.getElementById('volAlphaFill');
        const powerButton = document.getElementById('powerButton');
        const statusText = document.getElementById('statusText');

        // Variables de audio
        let audioContext = null;
        let masterGainNode = null;
        let filterNode = null; // Filtro paso bajo para suavizar

        // Estructura para cada acorde (fundamental, tercera mayor, séptima menor)
        const notes = {
            la: { 
                gainNode: null, 
                oscillators: [], 
                frequencies: [220, 277.18, 392],    // La3, Do#4, Sol4
                gains: [0.5, 0.25, 0.15] 
            },
            re: { 
                gainNode: null, 
                oscillators: [], 
                frequencies: [146.83, 185.0, 261.6], // Re3, Fa#3, Do4
                gains: [0.5, 0.25, 0.15] 
            },
            mi: { 
                gainNode: null, 
                oscillators: [], 
                frequencies: [165, 207.9, 294],      // Mi3, Sol#3, Re4
                gains: [0.5, 0.25, 0.15] 
            }
        };

        let isOn = false;
        const MAX_SPEED = 360; // grados/segundo para volumen máximo
        const threshold = 10;   // umbral para silencio total

        // Inicializar audio
        async function initAudio() {
            if (audioContext) return;

            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                // Filtro paso bajo para eliminar posibles artefactos de alta frecuencia
                filterNode = audioContext.createBiquadFilter();
                filterNode.type = 'lowpass';
                filterNode.frequency.value = 2000;
                filterNode.Q.value = 0.7;

                masterGainNode = audioContext.createGain();
                masterGainNode.gain.value = 0.5;
                
                masterGainNode.connect(filterNode);
                filterNode.connect(audioContext.destination);

                for (let noteName in notes) {
                    const note = notes[noteName];
                    const gainNode = audioContext.createGain();
                    gainNode.gain.value = 0;
                    gainNode.connect(masterGainNode);
                    note.gainNode = gainNode;

                    for (let i = 0; i < note.frequencies.length; i++) {
                        const osc = audioContext.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.value = note.frequencies[i];

                        const oscGain = audioContext.createGain();
                        oscGain.gain.value = note.gains[i];

                        osc.connect(oscGain);
                        oscGain.connect(gainNode);
                        osc.start();
                        note.oscillators.push(osc);
                    }
                }

                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                }
            } catch (e) {
                console.error('Error al inicializar audio:', e);
                alert('No se pudo inicializar el audio.');
            }
        }

        // Detener audio
        function stopAudio() {
            for (let noteName in notes) {
                const note = notes[noteName];
                note.oscillators.forEach(osc => {
                    try {
                        osc.stop();
                        osc.disconnect();
                    } catch (e) {}
                });
                note.oscillators = [];
                if (note.gainNode) {
                    note.gainNode.disconnect();
                    note.gainNode = null;
                }
            }
            if (masterGainNode) {
                masterGainNode.disconnect();
                masterGainNode = null;
            }
            if (filterNode) {
                filterNode.disconnect();
                filterNode = null;
            }
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
        }

        // Botón encender/apagar
        powerButton.addEventListener('click', async () => {
            if (!isOn) {
                await initAudio();
                if (audioContext) {
                    isOn = true;
                    powerButton.textContent = '🔇 APAGAR';
                    powerButton.classList.add('off');
                    statusText.textContent = 'Encendido - Gira el dispositivo';
                }
            } else {
                stopAudio();
                isOn = false;
                powerButton.textContent = '🔊 ENCENDER';
                powerButton.classList.remove('off');
                statusText.textContent = 'Apagado';
                volGammaFill.style.width = '0%';
                volBetaFill.style.width = '0%';
                volAlphaFill.style.width = '0%';
                speedGammaSpan.textContent = '0';
                speedBetaSpan.textContent = '0';
                speedAlphaSpan.textContent = '0';
            }
        });

        // Solicitar permisos de movimiento
        function requestMotionPermission() {
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('devicemotion', handleMotion);
                        } else {
                            alert('Permiso denegado para usar el giroscopio.');
                        }
                    })
                    .catch(console.error);
            } else {
                window.addEventListener('devicemotion', handleMotion);
            }
        }

        // Manejador de movimiento
        function handleMotion(event) {
            if (!isOn || !audioContext) return;

            const rotation = event.rotationRate;
            if (!rotation) return;

            let gamma = Math.abs(rotation.gamma || 0);
            let beta = Math.abs(rotation.beta || 0);
            let alpha = Math.abs(rotation.alpha || 0);

            if (isNaN(gamma)) gamma = 0;
            if (isNaN(beta)) beta = 0;
            if (isNaN(alpha)) alpha = 0;

            speedGammaSpan.textContent = Math.round(gamma);
            speedBetaSpan.textContent = Math.round(beta);
            speedAlphaSpan.textContent = Math.round(alpha);

            // Calcular volumen (0 a 1)
            let volGamma = Math.min(gamma / MAX_SPEED, 1.0);
            let volBeta = Math.min(beta / MAX_SPEED, 1.0);
            let volAlpha = Math.min(alpha / MAX_SPEED, 1.0);

            // Silencio total por debajo del umbral
            if (gamma < threshold) volGamma = 0;
            if (beta < threshold) volBeta = 0;
            if (alpha < threshold) volAlpha = 0;

            // Suavizado exponencial con setTargetAtTime (elimina clics)
            const now = audioContext.currentTime;
            const attackTime = 0.05;
            const releaseTime = 0.1;

            if (notes.la.gainNode) {
                if (volGamma > 0) {
                    notes.la.gainNode.gain.setTargetAtTime(volGamma, now, attackTime);
                } else {
                    notes.la.gainNode.gain.setTargetAtTime(0, now, releaseTime);
                }
            }
            if (notes.re.gainNode) {
                if (volBeta > 0) {
                    notes.re.gainNode.gain.setTargetAtTime(volBeta, now, attackTime);
                } else {
                    notes.re.gainNode.gain.setTargetAtTime(0, now, releaseTime);
                }
            }
            if (notes.mi.gainNode) {
                if (volAlpha > 0) {
                    notes.mi.gainNode.gain.setTargetAtTime(volAlpha, now, attackTime);
                } else {
                    notes.mi.gainNode.gain.setTargetAtTime(0, now, releaseTime);
                }
            }

            // Actualizar barras visuales
            volGammaFill.style.width = (volGamma * 100) + '%';
            volBetaFill.style.width = (volBeta * 100) + '%';
            volAlphaFill.style.width = (volAlpha * 100) + '%';
        }

        // Iniciar escucha al cargar la página
        window.addEventListener('load', () => {
            requestMotionPermission();
        });

        // Reintentar al pulsar el botón
        powerButton.addEventListener('click', () => {
            if (!window.hasMotionListener) {
                window.hasMotionListener = true;
                requestMotionPermission();
            }
        });

        // Pausar cuando la página no es visible
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && isOn && audioContext) {
                const now = audioContext.currentTime;
                if (notes.la.gainNode) notes.la.gainNode.gain.setTargetAtTime(0, now, 0.1);
                if (notes.re.gainNode) notes.re.gainNode.gain.setTargetAtTime(0, now, 0.1);
                if (notes.mi.gainNode) notes.mi.gainNode.gain.setTargetAtTime(0, now, 0.1);
            }
        });
    </script>
</body>
</html>
