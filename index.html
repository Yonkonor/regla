<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bandoneón Sintético con Acelerómetro</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      text-align: center;
      padding: 2rem;
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }

    #startBtn { background: #2ecc71; }
    #chordBtn { background: #3498db; }

    .info {
      margin-top: 20px;
      font-size: 14px;
      color: #aaa;
    }
  </style>
</head>
<body>

  <h1>Bandoneón Sintético (Acelerómetro)</h1>

  <button id="startBtn">Iniciar Audio</button>
  <button id="chordBtn">Cambiar a Re Maj7</button>

  <div class="info">
    Mueve el dispositivo como si abrieras/cerraras un bandoneón.
  </div>

<script>
/*******************************
 * CONFIGURACIÓN GENERAL
 *******************************/

const NOISE_THRESHOLD = 0.4;   // Zona muerta (quieto = silencio)
const SMOOTHING = 0.95;        // Filtro paso bajo
const MAX_GAIN = 0.6;

/*******************************
 * CONTEXTO DE AUDIO
 *******************************/

let audioCtx;
let masterGain;
let filter;
let compressor;

let oscillators = [];
let gains = [];

let running = false;

/*******************************
 * ACORDES
 *******************************/

// Re Mayor: D F# A
// Re Maj7:  D F# A C#

const chords = {
  major: [293.66, 369.99, 440.00],
  maj7:  [293.66, 369.99, 440.00, 554.37]
};

let currentChord = 'major';

/*******************************
 * FILTRO DE ACELERACIÓN
 *******************************/

let lastAcc = 0;

function smooth(value) {
  lastAcc = SMOOTHING * lastAcc + (1 - SMOOTHING) * value;
  return lastAcc;
}

/*******************************
 * INICIALIZAR AUDIO
 *******************************/

function initAudio() {

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  compressor = audioCtx.createDynamicsCompressor();
  compressor.threshold.value = -24;
  compressor.knee.value = 30;
  compressor.ratio.value = 6;
  compressor.attack.value = 0.003;
  compressor.release.value = 0.25;

  filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 1800;
  filter.Q.value = 1.2;

  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0;

  filter.connect(compressor);
  compressor.connect(masterGain);
  masterGain.connect(audioCtx.destination);

  createOscillators();
}

/*******************************
 * CREAR ARMÓNICOS
 *******************************/

function createOscillators() {

  stopOscillators();

  oscillators = [];
  gains = [];

  const baseNotes = chords[currentChord];

  baseNotes.forEach(freq => {

    const harmonics = [1, 2, 3, 4, 5];

    harmonics.forEach(h => {

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = 'sawtooth';
      osc.frequency.value = freq * h;

      gain.gain.value = 0;

      osc.connect(gain);
      gain.connect(filter);

      osc.start();

      oscillators.push({ osc, h });
      gains.push(gain);

    });

  });
}

function stopOscillators() {

  oscillators.forEach(o => {
    try { o.osc.stop(); } catch(e){}
  });

  oscillators = [];
  gains = [];
}

/*******************************
 * CONTROL DE PRESIÓN
 *******************************/

function updatePressure(rawAcc) {

  // Magnitud del cambio
  let pressure = Math.abs(rawAcc);

  // Suavizado
  pressure = smooth(pressure);

  // Zona muerta
  if (pressure < NOISE_THRESHOLD) {
    masterGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.08);
    return;
  }

  // Normalizar
  pressure = Math.min(1, pressure / 4);

  // Volumen general
  const volume = pressure * MAX_GAIN;
  masterGain.gain.setTargetAtTime(volume, audioCtx.currentTime, 0.05);

  // Modelado armónico
  gains.forEach((g, i) => {

    const h = oscillators[i].h;

    const harmonicFactor = Math.pow(pressure, h * 0.6);

    const target = (1 / h) * harmonicFactor * 0.8;

    g.gain.setTargetAtTime(target, audioCtx.currentTime, 0.05);

  });
}

/*******************************
 * ACELERÓMETRO (DERIVADA)
 *******************************/

let lastZ = 0;

function handleMotion(event) {

  if (!running) return;

  const acc = event.accelerationIncludingGravity;

  if (!acc) return;

  const z = acc.z || 0;

  // Derivada: cambio de aceleración
  const delta = z - lastZ;
  lastZ = z;

  updatePressure(delta);
}

/*******************************
 * BOTONES
 *******************************/

const startBtn = document.getElementById('startBtn');
const chordBtn = document.getElementById('chordBtn');

startBtn.addEventListener('click', async () => {

  if (!audioCtx) {
    initAudio();
  }

  if (audioCtx.state === 'suspended') {
    await audioCtx.resume();
  }

  if (typeof DeviceMotionEvent !== 'undefined' &&
      typeof DeviceMotionEvent.requestPermission === 'function') {

    const permission = await DeviceMotionEvent.requestPermission();

    if (permission !== 'granted') {
      alert('Permiso de movimiento denegado');
      return;
    }
  }

  window.addEventListener('devicemotion', handleMotion);

  running = true;
  startBtn.textContent = 'Audio Activo';
});

chordBtn.addEventListener('click', () => {

  if (currentChord === 'major') {
    currentChord = 'maj7';
    chordBtn.textContent = 'Cambiar a Re Mayor';
  } else {
    currentChord = 'major';
    chordBtn.textContent = 'Cambiar a Re Maj7';
  }

  if (audioCtx) {
    createOscillators();
  }
});

</script>

</body>
</html>
