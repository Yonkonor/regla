<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medidor con Sonido</title>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  margin-top: 40px;
}

#statusBtn {
  width: 150px;
  height: 150px;
  border-radius: 50%;
  border: none;
  font-size: 20px;
  color: white;
  background-color: red;
}

#distance {
  margin-top: 20px;
  font-size: 22px;
}

#sliderContainer,
#noiseContainer {
  margin-top: 30px;
}

input[type="range"] {
  width: 250px;
}
</style>
</head>

<body>

<h2>Estado del Móvil</h2>

<button id="statusBtn">Quieto</button>

<div id="distance">Distancia: 0 cm</div>

<div id="sliderContainer">
  <p>Umbral Aceleración: <span id="thresholdValue">0.20</span> m/s²</p>
  <input type="range" id="thresholdSlider"
         min="0.01" max="3" step="0.01" value="0.20">
</div>

<div id="noiseContainer">
  <p>Umbral Distancia: <span id="noiseValue">0.50</span> cm</p>
  <input type="range" id="noiseSlider"
         min="0" max="10" step="0.1" value="0.5">
</div>

<script>
let lastTime = null;
let velocity = 0;
let distance = 0;
let isMoving = false;

let accelThreshold = 0.2;
let noiseThreshold = 0.5;

// UI
const btn = document.getElementById("statusBtn");
const distanceText = document.getElementById("distance");

const slider = document.getElementById("thresholdSlider");
const thresholdLabel = document.getElementById("thresholdValue");

const noiseSlider = document.getElementById("noiseSlider");
const noiseLabel = document.getElementById("noiseValue");

thresholdLabel.textContent = accelThreshold.toFixed(2);
noiseLabel.textContent = noiseThreshold.toFixed(2);

slider.addEventListener("input", () => {
  accelThreshold = parseFloat(slider.value);
  thresholdLabel.textContent = accelThreshold.toFixed(2);
});

noiseSlider.addEventListener("input", () => {
  noiseThreshold = parseFloat(noiseSlider.value);
  noiseLabel.textContent = noiseThreshold.toFixed(2);
});

/* ================= AUDIO ================= */

let audioCtx;
let gainNode;
let osc1, osc2, osc3;
let filter;

function initAudio() {

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  gainNode = audioCtx.createGain();
  gainNode.gain.value = 0;

  filter = audioCtx.createBiquadFilter();
  filter.type = "lowpass";
  filter.frequency.value = 1200;

  // Re mayor: D - F# - A
  osc1 = audioCtx.createOscillator(); // D4
  osc2 = audioCtx.createOscillator(); // F#4
  osc3 = audioCtx.createOscillator(); // A4

  osc1.frequency.value = 293.66;
  osc2.frequency.value = 369.99;
  osc3.frequency.value = 440.00;

  // Timbre tipo bandoneón
  osc1.type = "sawtooth";
  osc2.type = "sawtooth";
  osc3.type = "sawtooth";

  osc1.connect(filter);
  osc2.connect(filter);
  osc3.connect(filter);

  filter.connect(gainNode);
  gainNode.connect(audioCtx.destination);

  osc1.start();
  osc2.start();
  osc3.start();
}

/* ======================================== */

function requestPermission() {

  if (!audioCtx) initAudio();

  if (typeof DeviceMotionEvent.requestPermission === "function") {

    DeviceMotionEvent.requestPermission()
      .then(r => {
        if (r === "granted") startSensor();
      });

  } else {
    startSensor();
  }
}

function startSensor() {
  window.addEventListener("devicemotion", handleMotion);
}

function handleMotion(event) {

  const acc = event.acceleration;
  if (!acc) return;

  const ax = acc.x || 0;
  const ay = acc.y || 0;
  const az = acc.z || 0;

  const totalAcc = Math.sqrt(ax*ax + ay*ay + az*az);

  const now = Date.now();

  if (lastTime === null) {
    lastTime = now;
    return;
  }

  const dt = (now - lastTime) / 1000;
  lastTime = now;

  // Filtro antideriva
  let filteredAcc = totalAcc;

  if (filteredAcc < accelThreshold) {
    filteredAcc = 0;
  }

  if (filteredAcc > 0) {

    if (!isMoving) {
      velocity = 0;
      distance = 0;
    }

    isMoving = true;

    velocity += filteredAcc * dt;
    distance += velocity * dt;

  } else {

    if (isMoving) velocity = 0;
    isMoving = false;
  }

  updateUI();
  updateSound();
}

function updateUI() {

  if (isMoving) {
    btn.style.backgroundColor = "green";
    btn.textContent = "En movimiento";
  } else {
    btn.style.backgroundColor = "red";
    btn.textContent = "Quieto";
  }

  let cm = Math.abs(distance * 100);

  if (cm < noiseThreshold) cm = 0;

  distanceText.textContent =
    "Distancia: " + cm.toFixed(2) + " cm";
}

/* ======== CONTROL DE VOLUMEN POR DISTANCIA ======== */

function updateSound() {

  if (!gainNode) return;

  let cm = Math.abs(distance * 100);

  if (cm < noiseThreshold) {
    gainNode.gain.value = 0;
    return;
  }

  // Normalización (0–50 cm → 0–1)
  let normalized = cm / 50;

  if (normalized > 1) normalized = 1;

  // Suavizado
  gainNode.gain.setTargetAtTime(
    normalized * 0.6,
    audioCtx.currentTime,
    0.05
  );
}

/* ================================================ */

document.body.addEventListener("click", requestPermission, { once: true });
</script>

</body>
</html>
